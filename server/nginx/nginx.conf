# ─────────────────────────────────────────────────────────
# Nginx RTMP Configuration
# ─────────────────────────────────────────────────────────
# This config sets up:
# 1. RTMP server on port 1935 for OBS ingestion
# 2. on_publish callback to validate stream keys via backend API
# 3. HLS output for viewer playback
# 4. HTTP server on port 8080 to serve HLS files
#
# Install: brew install nginx-full --with-rtmp-module (macOS)
# Or use: https://github.com/arut/nginx-rtmp-module
# ─────────────────────────────────────────────────────────

worker_processes auto;

events {
    worker_connections 1024;
}

# ── RTMP Server ──────────────────────────────────────────

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;

            # Auth callback — validates streamKey via backend API
            # Nginx sends POST with 'name' = streamKey
            on_publish http://localhost:3001/api/streaming/auth;

            # HLS output
            hls on;
            hls_path /tmp/hls;
            hls_fragment 3;
            hls_playlist_length 30;

            # Optional: notify when stream ends
            # on_publish_done http://localhost:3001/api/streaming/on-done;
        }
    }
}

# ── HTTP Server (serves HLS files) ──────────────────────

http {
    server {
        listen 8080;

        # Serve HLS files
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }
    }
}

# ─────────────────────────────────────────────────────────
# OBS Configuration:
# ─────────────────────────────────────────────────────────
# Server:     rtmp://localhost/live
# Stream Key: <your-channel-stream-key>
#
# The stream key is generated when you register and can
# be found on your Dashboard page.
# ─────────────────────────────────────────────────────────
